<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>画廊 · Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-ui@2.15.3/lib/theme-chalk/index.css" crossorigin="anonymous">
  <style>
    /* ── Design Tokens ── */
    :root {
      --bg:         #0a0a0c;
      --surface:    #111116;
      --card:       #16161d;
      --border:     rgba(255,255,255,0.07);
      --gold:       #c9a84c;
      --gold-dim:   #8a6f30;
      --gold-glow:  rgba(201,168,76,0.15);
      --text:       #e8e4dc;
      --muted:      #6b6878;
      --danger:     #c0392b;
      --success:    #27ae60;
      --radius:     12px;
      --font-serif: 'Playfair Display', serif;
      --font-sans:  'DM Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 99px; }

    /* ══════════════════════════════
       HEADER
    ══════════════════════════════ */
    .header-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,12,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 64px;
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 20px;
      color: var(--gold);
      letter-spacing: 0.04em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo span { color: var(--muted); font-size: 13px; font-family: var(--font-sans); font-weight: 300; margin-left: 8px; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── Album selector trigger ── */
    .album-trigger {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      min-width: 220px;
      position: relative;
      user-select: none;
    }
    .album-trigger:hover { border-color: var(--gold-dim); background: var(--card); }
    .album-trigger.active { border-color: var(--gold); }

    .album-trigger-label {
      flex: 1;
      font-size: 13px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .album-trigger-label.placeholder { color: var(--muted); }
    .album-trigger-icon {
      color: var(--muted);
      font-size: 11px;
      transition: transform 0.2s;
    }
    .album-trigger.active .album-trigger-icon { transform: rotate(180deg); color: var(--gold); }

    /* ── Album dropdown panel ── */
    .album-panel {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      width: 320px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      z-index: 200;
      overflow: hidden;
      animation: panelIn 0.18s ease;
    }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Breadcrumb ── */
    .album-breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 14px 8px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .crumb-item {
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .crumb-item:hover { color: var(--gold); }
    .crumb-item.current { color: var(--text); cursor: default; }
    .crumb-sep { color: var(--border); font-size: 10px; }

    /* ── Album tree list ── */
    .album-list {
      max-height: 320px;
      overflow-y: auto;
      padding: 6px 0;
    }

    .album-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 13px;
      color: var(--text);
    }
    .album-row:hover { background: var(--card); }
    .album-row.selected { background: var(--gold-glow); color: var(--gold); }

    .album-row-icon { font-size: 14px; flex-shrink: 0; }
    .album-row-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .album-row-count { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .album-row-arrow { font-size: 10px; color: var(--muted); flex-shrink: 0; }

    .album-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ── Filter pills ── */
    .filter-pills {
      display: flex;
      gap: 6px;
    }
    .pill {
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    .pill:hover { border-color: var(--gold-dim); color: var(--text); }
    .pill.active { background: var(--gold); border-color: var(--gold); color: #0a0a0c; font-weight: 700; }

    /* ── Nav links ── */
    .nav-links { display: flex; gap: 6px; margin-left: auto; }
    .nav-link {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid var(--border);
      background: transparent;
      transition: all 0.2s;
      cursor: pointer;
      white-space: nowrap;
    }
    .nav-link:hover { color: var(--text); border-color: var(--gold-dim); }
    .nav-link.current { color: var(--gold); border-color: var(--gold-dim); }

    /* ══════════════════════════════
       EMPTY STATE
    ══════════════════════════════ */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 64px);
      padding: 60px 20px;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    .empty-icon {
      width: 80px;
      height: 80px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: var(--muted);
      margin-bottom: 24px;
      background: var(--surface);
    }
    .empty-state h2 {
      font-family: var(--font-serif);
      font-size: 26px;
      color: var(--text);
      font-weight: 400;
      margin-bottom: 10px;
    }
    .empty-state p { color: var(--muted); font-size: 14px; line-height: 1.7; }

    /* ══════════════════════════════
       WATERFALL GRID
    ══════════════════════════════ */
    .waterfall-container {
      column-count: 5;
      column-gap: 12px;
      padding: 20px 20px;
      width: 100%;
    }

    .waterfall-item {
      break-inside: avoid;
      margin-bottom: 12px;
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      background: var(--card);
      border: 1px solid var(--border);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease, border-color 0.3s ease;
      animation: itemReveal 0.4s ease both;
    }

    @keyframes itemReveal {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .waterfall-item:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--gold-dim);
      border-color: var(--gold-dim);
      z-index: 5;
    }

    .waterfall-item .el-image,
    .waterfall-item video {
      width: 100%;
      display: block;
    }

    /* ── Hover overlay ── */
    .item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.25s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 14px 12px 12px;
    }
    .waterfall-item:hover .item-overlay { opacity: 1; }

    .overlay-album {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
      font-weight: 500;
    }
    .overlay-name {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
    }
    .overlay-actions { display: flex; gap: 6px; }
    .overlay-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: transform 0.15s, background 0.15s;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      color: #fff;
    }
    .overlay-btn:hover { transform: scale(1.15); background: rgba(255,255,255,0.25); }
    .overlay-btn.danger:hover { background: var(--danger); }
    .overlay-btn.copy:hover { background: var(--gold); color: #0a0a0c; }

    /* ── Load more ── */
    .load-area {
      text-align: center;
      padding: 32px 0 56px;
    }
    .load-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 32px;
      background: transparent;
      border: 1px solid var(--gold-dim);
      border-radius: 99px;
      color: var(--gold);
      font-size: 13px;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.04em;
    }
    .load-btn:hover { background: var(--gold-glow); border-color: var(--gold); }
    .load-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .load-end { color: var(--muted); font-size: 13px; letter-spacing: 0.04em; }
    .load-end::before { content: '— '; }
    .load-end::after { content: ' —'; }

    /* ── Spinner ── */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--gold-dim);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════
       RESPONSIVE
    ══════════════════════════════ */
    @media (max-width: 1400px) { .waterfall-container { column-count: 4; } }
    @media (max-width: 1100px) { .waterfall-container { column-count: 3; } }
    @media (max-width: 768px) {
      .waterfall-container { column-count: 2; padding: 12px; column-gap: 8px; }
      .waterfall-item { margin-bottom: 8px; }
      .header-bar { padding: 0 16px; gap: 10px; height: auto; min-height: 64px; flex-wrap: wrap; padding-top: 12px; padding-bottom: 12px; }
      .logo span { display: none; }
      .nav-links { display: none; }
    }
    @media (max-width: 480px) { .waterfall-container { column-count: 1; } }

    /* ── Element UI overrides ── */
    .el-image__inner { display: block !important; vertical-align: middle !important; }
    .el-image__error { background: var(--card); color: var(--muted); min-height: 80px; }
  </style>
</head>
<body>
<div id="app" @click.self="closePanels">

  <!-- ══ HEADER ══ -->
  <div class="header-bar">
    <div class="logo">Gallery<span>Admin</span></div>

    <!-- Album tree selector -->
    <div style="position: relative;" ref="albumSelectorWrap">
      <div class="album-trigger" :class="{ active: albumPanelOpen }" @click.stop="toggleAlbumPanel">
        <span style="font-size:14px; color: var(--muted);">▤</span>
        <span class="album-trigger-label" :class="{ placeholder: !selectedAlbumLabel }">
          {{ selectedAlbumLabel || '选择相册 / 目录' }}
        </span>
        <span class="album-trigger-icon">▾</span>
      </div>

      <!-- Cascading Panel -->
      <div class="album-panel" v-if="albumPanelOpen" @click.stop>

        <!-- Breadcrumb -->
        <div class="album-breadcrumb">
          <span class="crumb-item" @click="navigateTo(null)">根目录</span>
          <template v-for="(crumb, ci) in panelPath">
            <span class="crumb-sep">›</span>
            <span class="crumb-item" :class="{ current: ci === panelPath.length-1 }"
                  @click="navigateTo(ci)">{{ crumb }}</span>
          </template>
        </div>

        <div class="album-list">

          <!-- "All" shortcut at root -->
          <div class="album-row" v-if="panelPath.length === 0"
               :class="{ selected: selectedAlbum === 'All' }"
               @click="selectAlbum('All', '全览 · All')">
            <span class="album-row-icon">✦</span>
            <span class="album-row-name">所有相册（全览）</span>
          </div>

          <!-- "Uncategorized" at root -->
          <div class="album-row" v-if="panelPath.length === 0"
               :class="{ selected: selectedAlbum === 'None' }"
               @click="selectAlbum('None', '未分类')">
            <span class="album-row-icon">○</span>
            <span class="album-row-name">未分类</span>
          </div>

          <div class="album-divider" v-if="panelPath.length === 0"></div>

          <!-- Sub-folders -->
          <div class="album-row" v-for="folder in currentFolders" :key="'f-'+folder"
               @click="drillDown(folder)">
            <span class="album-row-icon">▤</span>
            <span class="album-row-name">{{ folder }}</span>
            <span class="album-row-count">{{ getFolderCount(folder) }}</span>
            <span class="album-row-arrow">›</span>
          </div>

          <!-- Leaf albums in this dir -->
          <div class="album-row" v-for="album in currentLeafAlbums" :key="'a-'+album.key"
               :class="{ selected: selectedAlbum === album.key }"
               @click="selectAlbum(album.key, album.label)">
            <span class="album-row-icon" style="color:var(--gold);">◈</span>
            <span class="album-row-name">{{ album.label }}</span>
            <span class="album-row-count">{{ albumCounts[album.key] || 0 }}</span>
          </div>

          <div class="album-row" v-if="currentFolders.length === 0 && currentLeafAlbums.length === 0 && panelPath.length > 0"
               style="color:var(--muted); cursor:default;">
            <span class="album-row-icon">—</span>
            <span class="album-row-name">此目录下暂无相册</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Filter pills -->
    <div class="filter-pills">
      <button class="pill" :class="{ active: filterType==='all' }"     @click="setFilter('all')">全部</button>
      <button class="pill" :class="{ active: filterType==='original' }" @click="setFilter('original')">原图</button>
      <button class="pill" :class="{ active: filterType==='preview' }" @click="setFilter('preview')">预览</button>
    </div>

    <!-- Nav links -->
    <div class="nav-links">
      <a href="./admin.html" class="nav-link">列表</a>
      <a href="./admin-imgtc.html" class="nav-link">网格</a>
      <a href="./admin-waterfall.html" class="nav-link current">瀑布流</a>
      <button class="nav-link" v-if="showLogoutButton" @click="handleLogout">退出</button>
    </div>
  </div>

  <!-- ══ EMPTY STATE ══ -->
  <div class="empty-state" v-if="selectedAlbum === ''">
    <div class="empty-icon">◈</div>
    <h2>选择一个相册开始浏览</h2>
    <p>支持多级目录导航<br>点击顶部下拉菜单选择相册或分类</p>
  </div>

  <!-- ══ WATERFALL ══ -->
  <div class="waterfall-container" v-else>
    <div class="waterfall-item" v-for="(item, index) in filteredTableData" :key="item.name"
         :style="{ animationDelay: (index % 30 * 30) + 'ms' }">
      <video v-if="isVideo(item.name)" style="width:100%;display:block;" controls preload="none">
        <source :src="'/file/'+item.name" type="video/mp4">
      </video>
      <el-image v-else :src="'/file/'+item.name" :preview-src-list="previewList(item.name)" lazy></el-image>

      <div class="item-overlay">
        <div class="overlay-album">{{ getAlbumLabel(item) }}</div>
        <div class="overlay-name">{{ getFileName(item) }}</div>
        <div class="overlay-actions">
          <button class="overlay-btn copy" @click.stop="handleCopy(item.name)" title="复制链接">⎘</button>
          <button class="overlay-btn danger" @click.stop="handleDelete(index, item.name)" title="删除">✕</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ LOAD MORE ══ -->
  <div class="load-area" v-if="selectedAlbum !== ''">
    <button class="load-btn" v-if="nextCursor" @click="loadMore(false)" :disabled="isLoading">
      <span class="spinner" v-if="isLoading"></span>
      <span>{{ isLoading ? '正在加载…' : '加载更多' }}</span>
    </button>
    <span class="load-end" v-else>已加载全部内容</span>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/element-ui@2.15.3/lib/index.js" crossorigin="anonymous"></script>
<script>
new Vue({
  el: '#app',
  data: {
    selectedAlbum: '',
    selectedAlbumLabel: '',
    filterType: 'all',
    showLogoutButton: false,
    tableData: [],
    nextCursor: null,
    isLoading: false,
    autoFetchCount: 0,

    // Album tree panel state
    albumPanelOpen: false,
    panelPath: [], // breadcrumb path segments within the panel
  },

  computed: {
    // ── All unique album keys from loaded data ──
    uniqueAlbumKeys() {
      const set = new Set();
      this.tableData.forEach(item => {
        if (item.metadata && item.metadata.ListType && item.metadata.ListType !== 'None') {
          set.add(item.metadata.ListType);
        }
      });
      return Array.from(set);
    },

    // ── Count per album key ──
    albumCounts() {
      const counts = {};
      this.tableData.forEach(item => {
        const k = (item.metadata && item.metadata.ListType) ? item.metadata.ListType : 'None';
        counts[k] = (counts[k] || 0) + 1;
      });
      return counts;
    },

    // ── Build tree: { 'folder': { 'subfolder': {...}, '__leaf__': [albumKey] } } ──
    albumTree() {
      const tree = {};
      this.uniqueAlbumKeys.forEach(key => {
        const parts = key.split('/');
        let node = tree;
        parts.forEach((part, i) => {
          if (i === parts.length - 1) {
            if (!node['__leaves__']) node['__leaves__'] = [];
            node['__leaves__'].push({ key, label: part });
          } else {
            if (!node[part]) node[part] = {};
            node = node[part];
          }
        });
      });
      return tree;
    },

    // ── Current tree node based on panelPath ──
    currentNode() {
      let node = this.albumTree;
      for (const seg of this.panelPath) {
        node = node[seg] || {};
      }
      return node;
    },

    currentFolders() {
      return Object.keys(this.currentNode).filter(k => k !== '__leaves__').sort();
    },

    currentLeafAlbums() {
      return (this.currentNode['__leaves__'] || []).sort((a,b) => a.label.localeCompare(b.label));
    },

    // ── Filtered data ──
    filteredTableData() {
      if (this.selectedAlbum === '') return [];

      return this.tableData.filter(item => {
        // Album match
        let matchAlbum = true;
        if (this.selectedAlbum !== 'All') {
          const k = (item.metadata && item.metadata.ListType) ? item.metadata.ListType : 'None';
          if (this.selectedAlbum === 'None') {
            matchAlbum = (k === 'None');
          } else {
            // Support prefix match: selecting a folder key shows all children
            matchAlbum = (k === this.selectedAlbum) || k.startsWith(this.selectedAlbum + '/');
          }
        }

        // Type match
        let matchType = true;
        if (this.filterType !== 'all') {
          const isPhoto = item.name.startsWith('A');
          if (this.filterType === 'preview') matchType = isPhoto;
          else if (this.filterType === 'original') matchType = !isPhoto;
        }

        return matchAlbum && matchType;
      });
    }
  },

  watch: {
    selectedAlbum(v) {
      if (v !== '') { this.autoFetchCount = 0; this.$nextTick(() => this.triggerAutoLoad()); }
    },
    filterType() {
      if (this.selectedAlbum !== '') { this.autoFetchCount = 0; this.$nextTick(() => this.triggerAutoLoad()); }
    }
  },

  methods: {
    // ── Album panel ──
    toggleAlbumPanel() {
      this.albumPanelOpen = !this.albumPanelOpen;
    },
    closePanels() {
      this.albumPanelOpen = false;
    },
    drillDown(folder) {
      this.panelPath.push(folder);
    },
    navigateTo(idx) {
      if (idx === null) {
        this.panelPath = [];
      } else {
        this.panelPath = this.panelPath.slice(0, idx + 1);
      }
    },
    selectAlbum(key, label) {
      this.selectedAlbum = key;
      this.selectedAlbumLabel = label;
      this.albumPanelOpen = false;
    },
    setFilter(f) {
      this.filterType = f;
    },

    // ── Count all items under a folder prefix ──
    getFolderCount(folder) {
      const prefix = [...this.panelPath, folder].join('/');
      let count = 0;
      this.tableData.forEach(item => {
        const k = (item.metadata && item.metadata.ListType) ? item.metadata.ListType : '';
        if (k === prefix || k.startsWith(prefix + '/')) count++;
      });
      return count || '';
    },

    // ── Helpers ──
    isVideo(name) {
      return /\.(mp4|webm|ogg|mov)$/i.test(name);
    },
    previewList(name) {
      return ['/file/' + name];
    },
    getAlbumLabel(item) {
      const k = (item.metadata && item.metadata.ListType && item.metadata.ListType !== 'None')
        ? item.metadata.ListType : '未分类';
      const parts = k.split('/');
      return parts[parts.length - 1];
    },
    getFileName(item) {
      return (item.metadata && item.metadata.fileName) ? item.metadata.fileName : item.name;
    },

    // ── Actions ──
    handleCopy(key) {
      const text = `${location.origin}/file/${key}`;
      (navigator.clipboard ? navigator.clipboard.writeText(text) : Promise.reject())
        .catch(() => {
          const ta = document.createElement('textarea');
          ta.value = text; ta.style.cssText = 'position:fixed;top:0;clip:rect(0 0 0 0)';
          document.body.appendChild(ta); ta.select();
          document.execCommand('copy'); document.body.removeChild(ta);
        });
      this.$message({ message: '链接已复制', type: 'success', duration: 1800 });
    },
    handleDelete(index, key) {
      if (!confirm('确认删除该图片？')) return;
      fetch('./api/manage/delete/' + key, { method: 'GET', credentials: 'include' })
        .then(() => {
          const i = this.tableData.findIndex(it => it.name === key);
          if (i > -1) this.tableData.splice(i, 1);
          this.$message.success('已删除');
        })
        .catch(() => this.$message.error('删除失败'));
    },
    handleLogout() {
      location.href = './api/manage/logout';
    },

    // ── Data loading ──
    async loadMore(isInitial = false) {
      if (this.isLoading) return;
      if (!isInitial && !this.nextCursor) return;

      this.isLoading = true;
      let url = './api/manage/list?limit=300';
      if (!isInitial && this.nextCursor) url += '&cursor=' + encodeURIComponent(this.nextCursor);

      try {
        const res = await fetch(url, { method: 'GET', credentials: 'include' });
        if (res.status === 401) { location.href = './api/manage/login'; return; }
        const data = await res.json();
        const items = (data.keys || []).map(item => Object.freeze(item));
        this.tableData.push(...items);
        this.nextCursor = data.list_complete ? null : data.cursor;
      } catch {
        this.$message.error('加载失败，请检查网络');
      } finally {
        this.isLoading = false;
        this.$nextTick(() => this.triggerAutoLoad());
      }
    },

    triggerAutoLoad() {
      if (this.selectedAlbum === '') return;
      if (this.filteredTableData.length < 15 && this.nextCursor && !this.isLoading && this.autoFetchCount < 5) {
        this.autoFetchCount++;
        this.loadMore(false);
      }
    }
  },

  mounted() {
    fetch('./api/manage/check', { method: 'GET', credentials: 'include' })
      .then(r => r.text())
      .then(t => {
        if (t === 'true') this.showLogoutButton = true;
        else if (t !== 'Not using basic auth.') location.href = './api/manage/login';
      });

    // Close panel on outside click
    document.addEventListener('click', () => { this.albumPanelOpen = false; });

    this.loadMore(true);
  }
})
</script>
</body>
</html>
