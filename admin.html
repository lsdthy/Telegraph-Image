<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沉浸画廊 · Immersive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-ui@2.15.3/lib/theme-chalk/index.css" crossorigin="anonymous">
  <style>
    :root {
      --bg:         #0a0a0c;
      --surface:    #111116;
      --card:       #16161d;
      --border:     rgba(255,255,255,0.07);
      --gold:       #c9a84c;
      --gold-dim:   #8a6f30;
      --gold-glow:  rgba(201,168,76,0.15);
      --text:       #e8e4dc;
      --muted:      #6b6878;
      --danger:     #c0392b;
      --font-serif: 'Playfair Display', serif;
      --font-sans:  'DM Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 99px; }

    /* ══ HEADER ══ */
    .header-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,12,0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 18px;
      height: 60px;
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 18px;
      color: var(--gold);
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Album trigger ── */
    .album-trigger {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 13px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      min-width: 210px;
      position: relative;
      user-select: none;
    }
    .album-trigger:hover { border-color: var(--gold-dim); }
    .album-trigger.active { border-color: var(--gold); }

    .album-trigger-label {
      flex: 1; font-size: 12.5px; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .album-trigger-label.placeholder { color: var(--muted); }
    .album-trigger-icon { color: var(--muted); font-size: 10px; transition: transform 0.2s; }
    .album-trigger.active .album-trigger-icon { transform: rotate(180deg); color: var(--gold); }

    /* ── Panel ── */
    .album-panel {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      width: 300px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
      z-index: 300;
      overflow: hidden;
      animation: panelIn 0.16s ease;
    }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .album-breadcrumb {
      display: flex; align-items: center; gap: 4px;
      padding: 11px 14px 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .crumb-item {
      font-size: 11px; color: var(--muted); cursor: pointer;
      padding: 2px 4px; border-radius: 4px; transition: color 0.15s;
    }
    .crumb-item:hover { color: var(--gold); }
    .crumb-item.current { color: var(--text); cursor: default; }
    .crumb-sep { color: var(--border); font-size: 9px; }

    .album-list { max-height: 300px; overflow-y: auto; padding: 5px 0; }

    .album-row {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 14px; cursor: pointer;
      transition: background 0.15s; font-size: 12.5px; color: var(--text);
    }
    .album-row:hover { background: var(--card); }
    .album-row.selected { background: var(--gold-glow); color: var(--gold); }
    .album-row-icon { font-size: 13px; flex-shrink: 0; }
    .album-row-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .album-row-count { font-size: 10px; color: var(--muted); flex-shrink: 0; }
    .album-row-arrow { font-size: 10px; color: var(--muted); flex-shrink: 0; }
    .album-divider { height: 1px; background: var(--border); margin: 3px 0; }

    /* ── Filter pills ── */
    .filter-pills { display: flex; gap: 5px; }
    .pill {
      padding: 5px 13px; border-radius: 99px; font-size: 11.5px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: transparent;
      color: var(--muted); transition: all 0.2s; letter-spacing: 0.02em; font-family: var(--font-sans);
    }
    .pill:hover { border-color: var(--gold-dim); color: var(--text); }
    .pill.active { background: var(--gold); border-color: var(--gold); color: #0a0a0c; font-weight: 700; }

    /* ── Nav links ── */
    .nav-links { display: flex; gap: 5px; margin-left: auto; }
    .nav-link {
      padding: 5px 12px; border-radius: 6px; font-size: 11.5px;
      text-decoration: none; color: var(--muted); border: 1px solid var(--border);
      background: transparent; transition: all 0.2s; cursor: pointer; white-space: nowrap;
      font-family: var(--font-sans);
    }
    .nav-link:hover { color: var(--text); border-color: var(--gold-dim); }
    .nav-link.current { color: var(--gold); border-color: var(--gold-dim); }

    /* ══ EMPTY STATE ══ */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: calc(100vh - 60px); padding: 60px 20px; text-align: center;
      animation: fadeIn 0.5s ease;
    }
    .empty-icon {
      width: 72px; height: 72px; border: 1px solid var(--border); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: var(--muted); margin-bottom: 22px; background: var(--surface);
    }
    .empty-state h2 {
      font-family: var(--font-serif); font-size: 24px; color: var(--text);
      font-weight: 400; margin-bottom: 8px;
    }
    .empty-state p { color: var(--muted); font-size: 13px; line-height: 1.8; }

    /* ══ SEAMLESS IMMERSIVE WATERFALL ══ */
    .waterfall-container {
      column-count: 5;
      column-gap: 0;
      padding: 0;
      width: 100%;
      font-size: 0;
      line-height: 0;
    }

    .waterfall-item {
      break-inside: avoid;
      margin: 0;
      padding: 0;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      display: block;
      width: 100%;
      /* subtle initial dim for the mosaic effect */
      filter: brightness(0.88) saturate(0.9);
      transition: filter 0.4s ease, z-index 0s;
      animation: itemReveal 0.5s ease both;
    }
    @keyframes itemReveal {
      from { opacity: 0; filter: brightness(0.5) saturate(0); }
      to   { opacity: 1; filter: brightness(0.88) saturate(0.9); }
    }

    .waterfall-item:hover {
      filter: brightness(1.05) saturate(1.1);
      z-index: 3;
    }

    .waterfall-item .el-image,
    .waterfall-item video {
      width: 100% !important;
      display: block !important;
      margin: 0 !important;
      padding: 0 !important;
      border: none !important;
      vertical-align: middle !important;
    }
    .el-image__inner { vertical-align: middle !important; display: block !important; }

    /* Hover overlay for immersive mode */
    .item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 12px 10px 10px;
    }
    .waterfall-item:hover .item-overlay { opacity: 1; }

    .overlay-album {
      font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 3px; font-weight: 500;
    }
    .overlay-name {
      font-size: 10px; color: rgba(255,255,255,0.65);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px;
    }
    .overlay-actions { display: flex; gap: 5px; }
    .overlay-btn {
      width: 26px; height: 26px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 11px;
      transition: transform 0.15s, background 0.15s;
      background: rgba(255,255,255,0.12); backdrop-filter: blur(4px); color: #fff;
    }
    .overlay-btn:hover { transform: scale(1.18); background: rgba(255,255,255,0.22); }
    .overlay-btn.copy:hover { background: var(--gold); color: #0a0a0c; }
    .overlay-btn.danger:hover { background: var(--danger); }

    /* ── Load more ── */
    .load-area { text-align: center; padding: 28px 0 50px; }
    .load-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 28px; background: transparent;
      border: 1px solid var(--gold-dim); border-radius: 99px;
      color: var(--gold); font-size: 12px; font-family: var(--font-sans);
      cursor: pointer; transition: all 0.25s; letter-spacing: 0.04em;
    }
    .load-btn:hover { background: var(--gold-glow); border-color: var(--gold); }
    .load-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .load-end { color: var(--muted); font-size: 12px; letter-spacing: 0.06em; }
    .load-end::before { content: '— '; }
    .load-end::after { content: ' —'; }

    .spinner {
      width: 12px; height: 12px;
      border: 2px solid var(--gold-dim); border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width: 1400px) { .waterfall-container { column-count: 4; } }
    @media (max-width: 1024px) { .waterfall-container { column-count: 3; } }
    @media (max-width: 768px) {
      .waterfall-container { column-count: 2; }
      .header-bar { padding: 0 14px; flex-wrap: wrap; height: auto; min-height: 60px; padding-top: 10px; padding-bottom: 10px; }
      .nav-links { display: none; }
    }
    @media (max-width: 480px) { .waterfall-container { column-count: 1; } }

    .el-image__error { background: var(--card); color: var(--muted); min-height: 60px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ══ HEADER ══ -->
  <div class="header-bar">
    <div class="logo">沉浸画廊</div>

    <div style="position: relative;">
      <div class="album-trigger" :class="{ active: albumPanelOpen }" @click.stop="toggleAlbumPanel">
        <span style="font-size:13px; color: var(--muted);">▤</span>
        <span class="album-trigger-label" :class="{ placeholder: !selectedAlbumLabel }">
          {{ selectedAlbumLabel || '选择相册 / 目录' }}
        </span>
        <span class="album-trigger-icon">▾</span>
      </div>

      <div class="album-panel" v-if="albumPanelOpen" @click.stop>
        <div class="album-breadcrumb">
          <span class="crumb-item" @click="navigateTo(null)">根目录</span>
          <template v-for="(crumb, ci) in panelPath">
            <span class="crumb-sep">›</span>
            <span class="crumb-item" :class="{ current: ci === panelPath.length-1 }"
                  @click="navigateTo(ci)">{{ crumb }}</span>
          </template>
        </div>
        <div class="album-list">
          <div class="album-row" v-if="panelPath.length === 0"
               :class="{ selected: selectedAlbum === 'All' }"
               @click="selectAlbum('All', '全览 · All')">
            <span class="album-row-icon">✦</span>
            <span class="album-row-name">所有相册（全览）</span>
          </div>
          <div class="album-row" v-if="panelPath.length === 0"
               :class="{ selected: selectedAlbum === 'None' }"
               @click="selectAlbum('None', '未分类')">
            <span class="album-row-icon">○</span>
            <span class="album-row-name">未分类</span>
          </div>
          <div class="album-divider" v-if="panelPath.length === 0"></div>

          <div class="album-row" v-for="folder in currentFolders" :key="'f-'+folder"
               @click="drillDown(folder)">
            <span class="album-row-icon">▤</span>
            <span class="album-row-name">{{ folder }}</span>
            <span class="album-row-count">{{ getFolderCount(folder) }}</span>
            <span class="album-row-arrow">›</span>
          </div>

          <div class="album-row" v-for="album in currentLeafAlbums" :key="'a-'+album.key"
               :class="{ selected: selectedAlbum === album.key }"
               @click="selectAlbum(album.key, album.label)">
            <span class="album-row-icon" style="color:var(--gold);">◈</span>
            <span class="album-row-name">{{ album.label }}</span>
            <span class="album-row-count">{{ albumCounts[album.key] || 0 }}</span>
          </div>

          <div class="album-row" v-if="currentFolders.length === 0 && currentLeafAlbums.length === 0 && panelPath.length > 0"
               style="color:var(--muted);cursor:default;">
            <span class="album-row-icon">—</span>
            <span class="album-row-name">此目录下暂无相册</span>
          </div>
        </div>
      </div>
    </div>

    <div class="filter-pills">
      <button class="pill" :class="{ active: filterType==='all' }"      @click="filterType='all'">全部</button>
      <button class="pill" :class="{ active: filterType==='original' }" @click="filterType='original'">原图</button>
      <button class="pill" :class="{ active: filterType==='preview' }"  @click="filterType='preview'">预览</button>
    </div>

    <div class="nav-links">
      <a href="./admin.html"          class="nav-link">列表</a>
      <a href="./admin-imgtc.html"    class="nav-link">网格</a>
      <a href="./admin-waterfall.html" class="nav-link">瀑布流</a>
      <a href="./admin-immersive.html" class="nav-link current">沉浸</a>
      <button class="nav-link" v-if="showLogoutButton" @click="handleLogout">退出</button>
    </div>
  </div>

  <!-- ══ EMPTY STATE ══ -->
  <div class="empty-state" v-if="selectedAlbum === ''">
    <div class="empty-icon">◈</div>
    <h2>沉浸式无缝画廊</h2>
    <p>在上方选择相册，开启全屏沉浸体验<br>支持多级目录导航</p>
  </div>

  <!-- ══ SEAMLESS WATERFALL ══ -->
  <div class="waterfall-container" v-else>
    <div class="waterfall-item" v-for="(item, index) in filteredTableData" :key="item.name"
         :style="{ animationDelay: (index % 30 * 25) + 'ms' }">
      <video v-if="isVideo(item.name)" controls preload="none">
        <source :src="'/file/'+item.name" type="video/mp4">
      </video>
      <el-image v-else :src="'/file/'+item.name" :preview-src-list="['/file/'+item.name]" lazy></el-image>

      <div class="item-overlay">
        <div class="overlay-album">{{ getAlbumLabel(item) }}</div>
        <div class="overlay-name">{{ getFileName(item) }}</div>
        <div class="overlay-actions">
          <button class="overlay-btn copy"   @click.stop="handleCopy(item.name)" title="复制链接">⎘</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ LOAD MORE ══ -->
  <div class="load-area" v-if="selectedAlbum !== ''">
    <button class="load-btn" v-if="nextCursor" @click="loadMore(false)" :disabled="isLoading">
      <span class="spinner" v-if="isLoading"></span>
      <span>{{ isLoading ? '正在加载…' : '加载更多' }}</span>
    </button>
    <span class="load-end" v-else>已加载全部内容</span>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/element-ui@2.15.3/lib/index.js" crossorigin="anonymous"></script>
<script>
new Vue({
  el: '#app',
  data: {
    selectedAlbum: '', selectedAlbumLabel: '', filterType: 'all',
    showLogoutButton: false, tableData: [], nextCursor: null,
    isLoading: false, autoFetchCount: 0,
    albumPanelOpen: false, panelPath: [],
  },
  computed: {
    uniqueAlbumKeys() {
      const s = new Set();
      this.tableData.forEach(i => { if (i.metadata?.ListType && i.metadata.ListType !== 'None') s.add(i.metadata.ListType); });
      return Array.from(s);
    },
    albumCounts() {
      const c = {};
      this.tableData.forEach(i => { const k = i.metadata?.ListType || 'None'; c[k] = (c[k]||0)+1; });
      return c;
    },
    albumTree() {
      const tree = {};
      this.uniqueAlbumKeys.forEach(key => {
        const parts = key.split('/');
        let node = tree;
        parts.forEach((p, i) => {
          if (i === parts.length-1) { (node['__leaves__'] = node['__leaves__']||[]).push({ key, label: p }); }
          else { node = (node[p] = node[p]||{}); }
        });
      });
      return tree;
    },
    currentNode() {
      let node = this.albumTree;
      for (const s of this.panelPath) node = node[s]||{};
      return node;
    },
    currentFolders() { return Object.keys(this.currentNode).filter(k=>k!=='__leaves__').sort(); },
    currentLeafAlbums() { return (this.currentNode['__leaves__']||[]).sort((a,b)=>a.label.localeCompare(b.label)); },
    filteredTableData() {
      if (!this.selectedAlbum) return [];
      return this.tableData.filter(item => {
        const k = item.metadata?.ListType || 'None';
        let matchAlbum = this.selectedAlbum === 'All' ? true
          : this.selectedAlbum === 'None' ? k === 'None'
          : k === this.selectedAlbum || k.startsWith(this.selectedAlbum+'/');
        let matchType = true;
        if (this.filterType !== 'all') {
          const isPhoto = item.name.startsWith('A');
          matchType = this.filterType === 'preview' ? isPhoto : !isPhoto;
        }
        return matchAlbum && matchType;
      });
    }
  },
  watch: {
    selectedAlbum(v) { if (v) { this.autoFetchCount=0; this.$nextTick(()=>this.triggerAutoLoad()); } },
    filterType()     { if (this.selectedAlbum) { this.autoFetchCount=0; this.$nextTick(()=>this.triggerAutoLoad()); } }
  },
  methods: {
    toggleAlbumPanel() { this.albumPanelOpen = !this.albumPanelOpen; },
    drillDown(f) { this.panelPath.push(f); },
    navigateTo(i) { this.panelPath = i===null ? [] : this.panelPath.slice(0, i+1); },
    selectAlbum(k, l) { this.selectedAlbum=k; this.selectedAlbumLabel=l; this.albumPanelOpen=false; },
    getFolderCount(folder) {
      const prefix = [...this.panelPath, folder].join('/');
      let c = 0;
      this.tableData.forEach(i => { const k=i.metadata?.ListType||''; if (k===prefix||k.startsWith(prefix+'/')) c++; });
      return c||'';
    },
    isVideo(n) { return /\.(mp4|webm|ogg|mov)$/i.test(n); },
    getAlbumLabel(item) {
      const k = (item.metadata?.ListType && item.metadata.ListType!=='None') ? item.metadata.ListType : '未分类';
      return k.split('/').pop();
    },
    getFileName(item) { return item.metadata?.fileName || item.name; },
    handleCopy(key) {
      const text = `${location.origin}/file/${key}`;
      (navigator.clipboard ? navigator.clipboard.writeText(text) : Promise.reject()).catch(()=>{
        const ta=document.createElement('textarea'); ta.value=text;
        ta.style.cssText='position:fixed;top:0;clip:rect(0 0 0 0)';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      });
      this.$message({ message:'链接已复制', type:'success', duration:1600 });
    },
    handleLogout() { location.href='./api/manage/logout'; },
    async loadMore(isInitial=false) {
      if (this.isLoading) return;
      if (!isInitial && !this.nextCursor) return;
      this.isLoading = true;
      let url = './api/manage/list?limit=300';
      if (!isInitial && this.nextCursor) url += '&cursor='+encodeURIComponent(this.nextCursor);
      try {
        const res = await fetch(url, { method:'GET', credentials:'include' });
        if (res.status===401) { location.href='./api/manage/login'; return; }
        const data = await res.json();
        this.tableData.push(...(data.keys||[]).map(i=>Object.freeze(i)));
        this.nextCursor = data.list_complete ? null : data.cursor;
      } catch { this.$message.error('加载失败'); }
      finally {
        this.isLoading=false;
        this.$nextTick(()=>this.triggerAutoLoad());
      }
    },
    triggerAutoLoad() {
      if (!this.selectedAlbum) return;
      if (this.filteredTableData.length<15 && this.nextCursor && !this.isLoading && this.autoFetchCount<5) {
        this.autoFetchCount++; this.loadMore(false);
      }
    }
  },
  mounted() {
    fetch('./api/manage/check',{method:'GET',credentials:'include'})
      .then(r=>r.text()).then(t=>{
        if (t==='true') this.showLogoutButton=true;
        else if (t!=='Not using basic auth.') location.href='./api/manage/login';
      });
    document.addEventListener('click', ()=>{ this.albumPanelOpen=false; });
    this.loadMore(true);
  }
})
</script>
</body>
</html>
